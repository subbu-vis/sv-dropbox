[scan]
min_file_size_bytes = 35102400
skip_shared_not_owned = true
skip_hidden = true
early_exit_row_threshold = 1000
max_csv_rows = 100
# Folders to skip during scan. One per line, indented under the key.
# Match is case-insensitive prefix: an entry skips the folder itself
# AND every file inside it (recursively). Add or remove entries freely.
ignored_folders =
    /Cetachi Comics
    /cubase

[paths]
csv_output_dir = ./output
log_dir = ./logs
